<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyme Tree Visualizer</title>

    <!-- External CDN Libraries -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/controls.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tree.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
</head>
<body>
    <!-- Top Metrics Bar -->
    <div id="metrics-bar" class="metrics-bar">
        <div class="metrics-item">
            <span class="metrics-label">Call Count:</span>
            <span id="call-count" class="metrics-value">0</span>
        </div>
        <div class="metrics-item">
            <span class="metrics-label">Nodes:</span>
            <span id="node-count" class="metrics-value">0</span>
        </div>
        <div class="metrics-item">
            <span class="metrics-label">Status:</span>
            <span id="status" class="metrics-value">Ready</span>
        </div>
    </div>

    <!-- Main Layout Container -->
    <div class="main-container">
        <!-- Left Control Panel -->
        <div class="control-panel">
            <h2>Abyme Visualizer</h2>

            <!-- Prompt Input -->
            <div class="control-group">
                <label for="prompt-input">Prompt</label>
                <textarea
                    id="prompt-input"
                    placeholder="Enter your problem here..."
                    rows="5"
                ></textarea>
            </div>

            <!-- Model Selection -->
            <div class="control-group">
                <label for="model-select">Model</label>
                <select id="model-select">
                    <option value="deepseek">DeepSeek</option>
                    <option value="gpt">GPT</option>
                    <option value="deepseek-r">DeepSeek (Reasoning)</option>
                </select>
            </div>

            <!-- Sliders -->
            <div class="control-group">
                <label for="max-depth-slider">
                    Max Depth: <span id="max-depth-value">5</span>
                </label>
                <input
                    type="range"
                    id="max-depth-slider"
                    min="1"
                    max="20"
                    value="5"
                    class="slider"
                >
            </div>

            <div class="control-group">
                <label for="max-call-slider">
                    Max Calls: <span id="max-call-value">3000</span>
                </label>
                <input
                    type="range"
                    id="max-call-slider"
                    min="100"
                    max="5000"
                    value="3000"
                    step="100"
                    class="slider"
                >
            </div>

            <div class="control-group">
                <label for="max-chain-slider">
                    Max Chain Length: <span id="max-chain-value">5</span>
                </label>
                <input
                    type="range"
                    id="max-chain-slider"
                    min="1"
                    max="10"
                    value="5"
                    class="slider"
                >
            </div>

            <div class="control-group">
                <label for="max-workers-slider">
                    Max Workers: <span id="max-workers-value">10</span>
                </label>
                <input
                    type="range"
                    id="max-workers-slider"
                    min="1"
                    max="50"
                    value="10"
                    class="slider"
                >
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button id="start-btn" class="btn btn-primary">Start Generation</button>
                <button id="stop-btn" class="btn btn-danger" style="display: none;">Stop</button>
            </div>
        </div>

        <!-- Tree Canvas -->
        <div class="tree-container">
            <svg id="tree-canvas"></svg>
        </div>
    </div>

    <!-- Detail Sidebar (Hidden by default) -->
    <div id="detail-sidebar" class="detail-sidebar">
        <div class="sidebar-header">
            <h3>Node Details</h3>
            <button id="close-sidebar-btn" class="close-btn">&times;</button>
        </div>
        <div class="sidebar-content">
            <div class="detail-section">
                <h4>Prompt</h4>
                <div id="detail-prompt" class="detail-text"></div>
            </div>
            <div class="detail-section">
                <h4>Fragment + Output</h4>
                <div id="detail-output" class="detail-text"></div>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules (ES6) -->
    <script type="module">
        import { initApp } from './static/js/main.js';

        // Initialize the application when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            console.log('[INIT] Starting Abyme Visualizer');
            initApp();
        });
    </script>
</body>
</html>
